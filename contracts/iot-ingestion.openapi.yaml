openapi: 3.1.0
info:
  title: Smart Campus — IoT Ingestion Contract
  version: 1.0.0
  description: |
    REST mock contract phụ trợ cho Lab 02 của service IoT Ingestion.
    Dependency chính của nhóm là Queue async với Pair 05 IoT Ingestion → Core Business
    và Pair 06 IoT Ingestion → Analytics. OpenAPI này dùng để thống nhất schema,
    kiểm thử Prism mock và chuẩn bị cho event contract/AsyncAPI ở Lab 03.
  contact:
    name: Dương Ngọc Đông - Nhóm 8
    email: 1771020158@dainam.edu.vn
servers:
  - url: http://localhost:4010
    description: Prism mock server
  - url: https://api.smart-campus.local/iot-ingestion/v1
    description: Smart Campus class network placeholder
tags:
  - name: health
    description: Kiểm tra trạng thái service
  - name: telemetry
    description: Tiếp nhận và truy vấn telemetry reading
  - name: devices
    description: Truy vấn trạng thái/reading mới nhất theo thiết bị
  - name: events
    description: Mock contract cho event IoT chuyển sang Lab 03
security:
  - bearerAuth: []
paths:
  /health:
    get:
      operationId: getIotIngestionHealth
      summary: Kiểm tra trạng thái IoT Ingestion
      description: Endpoint public để kiểm tra service IoT Ingestion còn hoạt động.
      tags: [health]
      security: []
      responses:
        '200':
          description: Service đang hoạt động
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              examples:
                ok:
                  value:
                    status: ok
                    service: iot-ingestion
                    time: '2026-05-19T04:33:00Z'

  /telemetry/readings:
    post:
      operationId: createTelemetryReading
      summary: Tiếp nhận telemetry reading
      description: |
        Provider IoT Ingestion nhận dữ liệu cảm biến từ device/gateway.
        Reading hợp lệ sẽ được chuẩn hóa và publish thành event cho Core Business và Analytics.
      tags: [telemetry]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelemetryReadingCreateRequest'
            examples:
              temperatureReading:
                value:
                  deviceId: SENSOR-001
                  locationId: ROOM-A101
                  sensorType: temperature
                  value: 30.5
                  unit: celsius
                  timestamp: '2026-05-19T04:33:00Z'
                  correlationId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
      responses:
        '202':
          description: Reading đã được chấp nhận để xử lý bất đồng bộ
          headers:
            Location:
              description: URI của reading vừa được ghi nhận.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryReadingAccepted'
              examples:
                accepted:
                  value:
                    readingId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2b111
                    eventId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2b222
                    status: ACCEPTED
                    acceptedAt: '2026-05-19T04:33:02Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /telemetry/readings/{readingId}:
    get:
      operationId: getTelemetryReadingById
      summary: Lấy chi tiết telemetry reading
      description: Consumer hoặc người vận hành truy vấn một reading đã được IoT Ingestion ghi nhận.
      tags: [telemetry]
      parameters:
        - $ref: '#/components/parameters/ReadingId'
      responses:
        '200':
          description: Chi tiết telemetry reading
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryReading'
              examples:
                reading:
                  value:
                    readingId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2b111
                    deviceId: SENSOR-001
                    locationId: ROOM-A101
                    sensorType: temperature
                    value: 30.5
                    unit: celsius
                    timestamp: '2026-05-19T04:33:00Z'
                    correlationId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                    ingestedAt: '2026-05-19T04:33:02Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /devices/{deviceId}/latest:
    get:
      operationId: getLatestDeviceReading
      summary: Lấy reading mới nhất của thiết bị
      description: Trả về telemetry reading mới nhất theo deviceId để Core Business/Analytics kiểm tra nhanh trạng thái thiết bị.
      tags: [devices]
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Reading mới nhất của thiết bị
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryReading'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /events/sensor:
    post:
      operationId: publishSensorEventMock
      summary: Mock ghi nhận sensor event
      description: |
        Endpoint mock để thống nhất schema event cho Pair 05 và Pair 06.
        Khi sang Lab 03, schema này sẽ được chuyển sang AsyncAPI/event contract chính thức.
      tags: [events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SensorEvent'
            examples:
              readingCreated:
                value:
                  eventType: sensor.reading.created
                  eventId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2b333
                  correlationId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                  deviceId: SENSOR-001
                  locationId: ROOM-A101
                  sensorType: temperature
                  value: 30.5
                  unit: celsius
                  timestamp: '2026-05-19T04:33:00Z'
              thresholdExceeded:
                value:
                  eventType: sensor.threshold.exceeded
                  eventId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2b444
                  correlationId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                  deviceId: SENSOR-002
                  locationId: LAB-01
                  sensorType: smoke
                  value: 88.2
                  unit: ppm
                  threshold: 70
                  severity: HIGH
                  timestamp: '2026-05-19T04:34:00Z'
      responses:
        '202':
          description: Event đã được chấp nhận
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventAccepted'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ReadingId:
      name: readingId
      in: path
      required: true
      description: UUID của telemetry reading.
      schema:
        type: string
        format: uuid
    DeviceId:
      name: deviceId
      in: path
      required: true
      description: Mã thiết bị IoT.
      schema:
        type: string
        pattern: '^SENSOR-[0-9]{3}$'

  schemas:
    HealthStatus:
      type: object
      additionalProperties: false
      required: [status, service, time]
      properties:
        status:
          type: string
          enum: [ok]
          example: ok
        service:
          type: string
          minLength: 2
          maxLength: 80
          example: iot-ingestion
        time:
          type: string
          format: date-time
          example: '2026-05-19T04:33:00Z'

    TelemetryReadingCreateRequest:
      type: object
      additionalProperties: false
      required: [deviceId, sensorType, value, unit, timestamp, correlationId]
      properties:
        deviceId:
          type: string
          pattern: '^SENSOR-[0-9]{3}$'
          example: SENSOR-001
        locationId:
          type: [string, 'null']
          minLength: 2
          maxLength: 80
          description: Vị trí thiết bị, có thể null nếu device chưa gán vị trí.
          example: ROOM-A101
        sensorType:
          type: string
          enum: [temperature, humidity, smoke, motion, power]
          example: temperature
        value:
          type: number
          minimum: -100
          maximum: 10000
          example: 30.5
        unit:
          type: string
          minLength: 1
          maxLength: 20
          example: celsius
        timestamp:
          type: string
          format: date-time
          example: '2026-05-19T04:33:00Z'
        correlationId:
          type: string
          format: uuid
          description: ID dùng để trace giữa IoT, Core Business và Analytics.

    TelemetryReading:
      type: object
      additionalProperties: false
      required: [readingId, deviceId, sensorType, value, unit, timestamp, correlationId, ingestedAt]
      properties:
        readingId:
          type: string
          format: uuid
        deviceId:
          type: string
          pattern: '^SENSOR-[0-9]{3}$'
          example: SENSOR-001
        locationId:
          type: [string, 'null']
          minLength: 2
          maxLength: 80
          example: ROOM-A101
        sensorType:
          type: string
          enum: [temperature, humidity, smoke, motion, power]
          example: temperature
        value:
          type: number
          minimum: -100
          maximum: 10000
          example: 30.5
        unit:
          type: string
          minLength: 1
          maxLength: 20
          example: celsius
        timestamp:
          type: string
          format: date-time
          example: '2026-05-19T04:33:00Z'
        correlationId:
          type: string
          format: uuid
        ingestedAt:
          type: string
          format: date-time

    TelemetryReadingAccepted:
      type: object
      additionalProperties: false
      required: [readingId, eventId, status, acceptedAt]
      properties:
        readingId:
          type: string
          format: uuid
        eventId:
          type: string
          format: uuid
        status:
          type: string
          enum: [ACCEPTED]
        acceptedAt:
          type: string
          format: date-time

    SensorEvent:
      oneOf:
        - $ref: '#/components/schemas/SensorReadingCreatedEvent'
        - $ref: '#/components/schemas/SensorThresholdExceededEvent'
        - $ref: '#/components/schemas/TelemetryIngestedEvent'
        - $ref: '#/components/schemas/DeviceStatusChangedEvent'
      discriminator:
        propertyName: eventType
        mapping:
          sensor.reading.created: '#/components/schemas/SensorReadingCreatedEvent'
          sensor.threshold.exceeded: '#/components/schemas/SensorThresholdExceededEvent'
          telemetry.ingested: '#/components/schemas/TelemetryIngestedEvent'
          device.status.changed: '#/components/schemas/DeviceStatusChangedEvent'

    SensorReadingCreatedEvent:
      type: object
      additionalProperties: false
      required: [eventType, eventId, correlationId, deviceId, sensorType, value, unit, timestamp]
      properties:
        eventType:
          type: string
          const: sensor.reading.created
        eventId:
          type: string
          format: uuid
        correlationId:
          type: string
          format: uuid
        deviceId:
          type: string
          pattern: '^SENSOR-[0-9]{3}$'
        locationId:
          type: [string, 'null']
          minLength: 2
          maxLength: 80
        sensorType:
          type: string
          enum: [temperature, humidity, smoke, motion, power]
        value:
          type: number
          minimum: -100
          maximum: 10000
        unit:
          type: string
          minLength: 1
          maxLength: 20
        timestamp:
          type: string
          format: date-time

    SensorThresholdExceededEvent:
      type: object
      additionalProperties: false
      required: [eventType, eventId, correlationId, deviceId, sensorType, value, unit, threshold, severity, timestamp]
      properties:
        eventType:
          type: string
          const: sensor.threshold.exceeded
        eventId:
          type: string
          format: uuid
        correlationId:
          type: string
          format: uuid
        deviceId:
          type: string
          pattern: '^SENSOR-[0-9]{3}$'
        locationId:
          type: [string, 'null']
          minLength: 2
          maxLength: 80
        sensorType:
          type: string
          enum: [temperature, humidity, smoke, motion, power]
        value:
          type: number
          minimum: -100
          maximum: 10000
        unit:
          type: string
          minLength: 1
          maxLength: 20
        threshold:
          type: number
          example: 70
        severity:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
          example: HIGH
        timestamp:
          type: string
          format: date-time

    TelemetryIngestedEvent:
      type: object
      additionalProperties: false
      required: [eventType, eventId, correlationId, deviceId, sensorType, value, unit, timestamp]
      properties:
        eventType:
          type: string
          const: telemetry.ingested
        eventId:
          type: string
          format: uuid
        correlationId:
          type: string
          format: uuid
        deviceId:
          type: string
          pattern: '^SENSOR-[0-9]{3}$'
        locationId:
          type: [string, 'null']
          minLength: 2
          maxLength: 80
        sensorType:
          type: string
          enum: [temperature, humidity, smoke, motion, power]
        value:
          type: number
          minimum: -100
          maximum: 10000
        unit:
          type: string
          minLength: 1
          maxLength: 20
        timestamp:
          type: string
          format: date-time

    DeviceStatusChangedEvent:
      type: object
      additionalProperties: false
      required: [eventType, eventId, correlationId, deviceId, status, timestamp]
      properties:
        eventType:
          type: string
          const: device.status.changed
        eventId:
          type: string
          format: uuid
        correlationId:
          type: string
          format: uuid
        deviceId:
          type: string
          pattern: '^SENSOR-[0-9]{3}$'
        status:
          type: string
          enum: [ONLINE, OFFLINE, DEGRADED]
        reason:
          type: [string, 'null']
          maxLength: 200
          example: heartbeat timeout
        timestamp:
          type: string
          format: date-time

    EventAccepted:
      type: object
      additionalProperties: false
      required: [eventId, acceptedAt]
      properties:
        eventId:
          type: string
          format: uuid
        acceptedAt:
          type: string
          format: date-time

    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          example: https://smart-campus.local/errors/validation
        title:
          type: string
          minLength: 3
          maxLength: 120
          example: Dữ liệu không hợp lệ
        status:
          type: integer
          minimum: 400
          maximum: 599
          example: 400
        detail:
          type: [string, 'null']
          maxLength: 500
          example: deviceId không đúng định dạng
        instance:
          type: [string, 'null']
          format: uri-reference
          example: /telemetry/readings
        errors:
          type: array
          minItems: 0
          maxItems: 50
          items:
            type: object
            additionalProperties: false
            required: [field, code, message]
            properties:
              field:
                type: string
                minLength: 1
                maxLength: 80
                example: deviceId
              code:
                type: string
                minLength: 2
                maxLength: 80
                example: PATTERN_MISMATCH
              message:
                type: string
                minLength: 3
                maxLength: 200
                example: deviceId phải có dạng SENSOR-001

  responses:
    BadRequest:
      description: Dữ liệu sai định dạng
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unauthorized:
      description: Thiếu hoặc sai thông tin xác thực
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Resource không tồn tại
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: Trùng eventId/correlationId hoặc xung đột idempotency
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    UnprocessableEntity:
      description: Payload đúng JSON nhưng vi phạm nghiệp vụ
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    TooManyRequests:
      description: Thiết bị hoặc client gửi quá nhiều request trong thời gian ngắn
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    InternalServerError:
      description: Lỗi không mong muốn phía server
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
